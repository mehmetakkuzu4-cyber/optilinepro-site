<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#07111f">
  <title>OptiLine Pro | Yönetim Merkezi</title>
  <link rel="icon" href="assets/app-icon.png">
  <link rel="stylesheet" href="assets/ui-shell.css">
  <script src="assets/portal.js" defer></script>
  <script src="assets/ui-shell.js" defer></script>
</head>
<body>
  <header class="topbar">
    <a class="app-brand" href="index.html" aria-label="OptiLine Pro ana sayfa">
      <img src="assets/logo.png" alt="">
      <span>OPTILINE PRO</span>
      <small>Yönetim Merkezi</small>
    </a>
    <div class="mode-tabs" role="tablist" aria-label="Çalışma alanı">
      <button class="active" data-mode="public" type="button">Web Sitesi</button>
      <button data-mode="customer" type="button">Müşteri Paneli</button>
      <button data-mode="admin" type="button">Admin Paneli</button>
    </div>
  </header>

  <div class="app-shell">
    <aside class="sidebar">
      <p class="sidebar-label">SAYFALAR</p>
      <nav class="side-nav" id="sideNav" aria-label="Sayfalar"></nav>
      <div class="sidebar-foot">
        <span class="status-dot"></span>
        <div><strong>Sistem çevrimiçi</strong><small>OptiLine Pro 1.1.1</small></div>
      </div>
    </aside>

    <main class="workspace">
      <section class="metrics" id="metrics" aria-label="Genel durum"></section>
      <section class="screen" id="screen" aria-live="polite"></section>
    </main>
  </div>
  <div class="toast" role="status" aria-live="polite"></div>
  <div data-live-proof="OL-1707-A" style="position:fixed;right:18px;bottom:18px;z-index:9999;padding:8px 12px;border:1px solid #2dd4bf;background:#071a2d;color:#d9fff8;font:700 12px/1.2 Segoe UI,sans-serif;box-shadow:0 8px 24px rgba(0,0,0,.22)">CANLI YAYIN TESTI &middot; OL-1707-A</div>
</body>
</html>
